<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Meritocracy — Leaderboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --bg: #0d1117;
            --bg2: #161b22;
            --bg3: #21262d;
            --border: #30363d;
            --green: #00e676;
            --text: #e6edf3;
            --muted: #8b949e;
            --gold: #fcc419;
            --silver: #ced4da;
            --bronze: #e67e22;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* NAV */
        .nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            height: 56px;
            background: #0a0d13;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px;
            font-weight: 600;
            color: var(--green);
            cursor: pointer;
        }

        .nav-links { display: flex; gap: 4px; }
        .nav-links a {
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 13px;
            color: var(--muted);
            text-decoration: none;
            transition: all .15s;
        }
        .nav-links a:hover { color: var(--text); background: var(--bg3); }
        .nav-links a.active { color: var(--green); }

        /* HERO */
        .hero {
            padding: 60px 20px;
            text-align: center;
            background: radial-gradient(circle at 50% -20%, rgba(0, 230, 118, 0.08) 0%, transparent 70%);
        }

        .hero h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 42px;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 12px;
        }

        .hero p {
            color: var(--muted);
            font-size: 16px;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* TOP 3 CARDS */
        .podium {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
            padding: 0 20px;
        }

        .podium-card {
            width: 200px;
            background: #12171f;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            position: relative;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .podium-card:hover {
            border-color: var(--green);
            transform: translateY(-8px);
            box-shadow: 0 20px 40px -20px rgba(0,0,0,0.5);
        }

        .podium-1 { height: 300px; border-color: var(--gold); background: linear-gradient(180deg, rgba(252, 196, 25, 0.05) 0%, transparent 100%); }
        .podium-2 { height: 260px; }
        .podium-3 { height: 240px; }

        .rank-badge {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }

        .badge-1 { background: var(--gold); color: #000; }
        .badge-2 { background: var(--silver); color: #000; }
        .badge-3 { background: var(--bronze); color: #fff; }

        .avatar-wrap {
            margin: 0 auto 16px;
            width: 80px;
            height: 80px;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid var(--border);
        }
        .podium-1 .avatar-wrap { border-color: var(--gold); width: 100px; height: 100px; margin-top: 10px; }

        .podium-name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .podium-xp {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            color: var(--green);
            font-weight: 600;
        }

        .podium-solved {
            font-size: 11px;
            color: var(--muted);
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* TABLE */
        .table-container {
            max-width: 900px;
            margin: 40px auto 100px;
            padding: 0 20px;
        }

        .lb-table {
            width: 100%;
            border-collapse: collapse;
            background: #0a0d13;
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .lb-table th {
            text-align: left;
            padding: 16px 24px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border);
            background: #0d1117;
        }

        .lb-row {
            border-bottom: 1px solid #1a2028;
            transition: background 0.15s;
        }
        .lb-row:hover { background: #12171f; }
        .lb-row:last-child { border-bottom: none; }

        .lb-row td {
            padding: 14px 24px;
            font-size: 14px;
        }

        .col-rank { width: 80px; font-family: 'JetBrains Mono', monospace; color: var(--muted); }
        .col-user { display: flex; align-items: center; gap: 12px; }
        .lb-avatar { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); }
        .lb-name { font-weight: 600; font-family: 'Space Grotesk', sans-serif; }
        
        .col-xp { font-family: 'JetBrains Mono', monospace; color: var(--green); font-weight: 600; text-align: right; }
        .col-solved { font-family: 'JetBrains Mono', monospace; color: var(--muted); text-align: center; }

        /* LOADER */
        .loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 80px 0;
            color: var(--muted);
            font-family: 'JetBrains Mono', monospace;
        }
        .spinner {
            width: 32px; height: 32px;
            border: 3px solid var(--bg3);
            border-top-color: var(--green);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--bg2); border: 2px solid var(--bg); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--border); }
    </style>
</head>
<body>

    <nav class="nav">
        <div class="logo" onclick="window.location.href='dashboard.html'">TerminalSolve<span>()</span></div>
        <div class="nav-links">
            <a href="problem.html">Problems</a>
            <a href="#">Contests</a>
            <a href="leaderboard.html" class="active">Leaderboard</a>
            <a href="profile.html">Profile</a>
        </div>
        <div id="nav-user" style="margin-left:auto"></div>
    </nav>

    <section class="hero">
        <h1>Global Meritocracy</h1>
        <p>Real-time technical supremacy. Only active developers who deploy solutions earn their place in the cloud archive.</p>
        
        <div id="podium-loading" class="loader">
            <div class="spinner"></div>
            <span>Gathering global data...</span>
        </div>

        <div class="podium" id="podium-area" style="display:none">
            <!-- Top 3 cards go here -->
        </div>
    </section>

    <div class="table-container">
        <table class="lb-table">
            <thead>
                <tr>
                    <th>RANK</th>
                    <th>DEVELOPER</th>
                    <th style="text-align:center">SOLVED</th>
                    <th style="text-align:right">XP POINTS</th>
                </tr>
            </thead>
            <tbody id="lb-body">
                <!-- Rest of leaderboard rows go here -->
            </tbody>
        </table>
        <div id="full-loading" class="loader" style="display:none">
            <div class="spinner"></div>
        </div>
    </div>

    <script src="leaderboard.js"></script>
</body>
</html>
